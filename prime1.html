<body>
    <script>
        var num,count=0,i;
        num=parseInt(prompt("Enter the number:"))
        i=1;
        while(i<=num)
        {
            if(num%i==0)
            {
               count++;
            }
            i++;
        }
        if(count==2)
        {
            console.log("it is prime number")
        }
        else 
        {
            console.log("it is not  a prime number")
        }
    </script>
</body>
