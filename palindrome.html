<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //121 -- 121
        var num,rem=0,temp,rev=0;
        num=parseInt(prompt("Enter the number"))
        temp=num;
        for(;num>0;)
        {   
            rem=num%10;
            rev=rev*10+rem
            num=Math.floor(num/10)
        }
        if(rev==temp)
        {
            alert("it is palindrome number")
        }
        else
        {
            alert("it is not a palindrome number")
        }
    </script>
</body>
</html>
